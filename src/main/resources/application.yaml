server:
  port: 8080
  tomcat:
    max-http-form-post-size: 10MB

spring:
  application:
    name: blog-website

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    cache: false

  web:
    resources:
      static-locations: classpath:/static/

  servlet:
    multipart:
      max-request-size: 10MB

  profiles:
    active: secret

